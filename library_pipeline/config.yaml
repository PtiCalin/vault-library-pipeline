# vault-library-pipeline — configuration
# All matches are case-insensitive checks on normalized title, filename,
# and, when available, first-page PDF text.
# Best-scoring key wins in each section.
# PAPER (type) and META (domain) are built-in catch-alls — keep them last.
# Inference supports list syntax and rich entries:
# - "keyword"
# - { term: "keyword", weight: 1.5, aliases: ["kw"], concepts: ["concept-tag"] }

# ------------------------------------------------------------------
# TYPE inference
# Keys become the TYPE token in the filename (must be UPPER_ALPHA).
# ------------------------------------------------------------------
type_keywords:

  # Academic
  REVIEW:       ["review", "systematic review", "literature review", "state of the art review"]
  SURVEY:       ["survey", "broad overview", "comprehensive survey"]
  META:         ["meta-analysis", "meta analysis", "pooled effect size"]
  THESIS:       ["thesis", "master thesis", "msc thesis", "memoire"]
  DISSERTATION: ["dissertation", "doctoral thesis", "phd thesis"]
  PREPRINT:     ["preprint", "arxiv", "working paper", "not peer reviewed"]

  # Conference / publication formats
  PROCEEDING:   ["proceedings", "conference paper", "in proceedings", "conference record"]
  ABSTRACT:     ["extended abstract", "abstract only"]
  POSTER:       ["poster", "research poster"]
  TALK:         ["presentation", "slide deck", "keynote", "talk slides", "lecture slides"]

  # Books & long-form
  BOOK:         ["handbook", "textbook", "introduction to", "guide to",
                  "principles of", "foundations of", "second edition", "third edition"]
  CHAPTER:      ["chapter"]
  MONOGRAPH:    ["monograph", "specialized monograph"]

  # Technical / industry / grey literature
  REPORT:       ["report", "technical report", "institutional report", "industry report"]
  WHITEPAPER:   ["white paper", "whitepaper", "position paper", "technology whitepaper"]
  STANDARD:     ["iso standard", "rfc", "w3c recommendation", "ieee standard"]
  SPEC:         ["specification", "api spec", "technical specification", "protocol spec"]
  DOC:          ["documentation", "reference manual", "user manual", "developer documentation"]

  # Educational / explanatory
  TUTORIAL:     ["tutorial", "step-by-step guide", "walkthrough"]
  GUIDE:        ["guide", "how-to", "best practices"]
  COURSE:       ["course material", "lecture notes", "lecture series", "syllabus"]
  NOTE:         ["reading notes", "field notes", "informal notes"]

  # Data / code / artifacts
  DATASET:      ["dataset", "data collection", "corpus", "benchmark dataset"]
  BENCHMARK:    ["benchmark", "evaluation dataset", "leaderboard", "benchmark suite"]
  CODE:         ["implementation", "codebase", "repository reference", "github repository"]
  MODEL:        ["model architecture", "pretrained model", "model card", "checkpoint"]

  # Media / communication
  ARTICLE:      ["magazine article", "editorial", "op-ed", "feature article"]
  BLOG:         ["blog post", "blog"]
  NEWS:         ["news article", "press release"]
  INTERVIEW:    ["interview", "q&a", "discussion transcript", "panel discussion"]

  # Legal / policy
  POLICY:       ["policy document", "governance document", "framework document", "public policy"]
  LAW:          ["legal text", "statute", "legislation", "legal code"]
  REGULATION:   ["regulation", "regulatory document", "directive", "compliance requirement"]

  # Catch-all — always last
  PAPER:        []

# ------------------------------------------------------------------
# DOMAIN inference
# Keys become the DOMAIN token in the filename (must be UPPER_ALPHA).
# Subdomains (e.g. COMPUTE.RECSYS) go in tags, not in the filename.
# ------------------------------------------------------------------
domain_keywords:

  FORMAL:
    - { term: "mathematics", aliases: ["mathematical"], concepts: ["math"] }
    - { term: "statistics", aliases: ["statistical", "statistical inference"], concepts: ["stats"] }
    - { term: "logic", aliases: ["formal logic"], concepts: ["logic"] }
    - { term: "optimization", aliases: ["mathematical optimization"], concepts: ["optimization"] }
    - { term: "probability", concepts: ["probability"] }
    - { term: "formal methods", concepts: ["formal-methods"] }
    - "algebra"
    - "calculus"
    - "combinatorics"

  COMPUTE:
    - { term: "machine learning", aliases: ["ml"], weight: 1.4, concepts: ["ml"] }
    - { term: "artificial intelligence", aliases: ["ai"], weight: 1.4, concepts: ["ai"] }
    - { term: "deep learning", concepts: ["deep-learning"] }
    - { term: "large language model", aliases: ["llm", "foundation model"], concepts: ["llm"] }
    - { term: "recommendation system", aliases: ["recommender system", "recsys"], concepts: ["recsys"] }
    - { term: "natural language processing", aliases: ["nlp"], concepts: ["nlp"] }
    - { term: "computer vision", aliases: ["vision model"], concepts: ["computer-vision"] }
    - { term: "software engineering", aliases: ["software architecture"], concepts: ["software-engineering"] }
    - { term: "database", aliases: ["dbms"], concepts: ["database"] }
    - { term: "distributed system", aliases: ["distributed systems"], concepts: ["distributed-systems"] }
    - { term: "cybersecurity", aliases: ["cyber security", "infosec", "computer security"], concepts: ["security"] }
    - { term: "malware", aliases: ["spyware", "ransomware", "trojan"], concepts: ["malware"] }
    - { term: "vulnerability", aliases: ["exploit", "zero click", "zero-click", "zeroclick"], concepts: ["vulnerability"] }
    - { term: "mobile security", aliases: ["android security", "ios security"], concepts: ["mobile-security"] }
    - { term: "forensics", aliases: ["reverse engineering"], concepts: ["forensics"] }
    - { term: "network security", concepts: ["network-security"] }
    - { term: "blockchain", concepts: ["blockchain"] }
    - "algorithm"
    - "computing"

  NATURE:
    - { term: "biology", aliases: ["cell biology", "molecular biology"], concepts: ["biology"] }
    - { term: "genomics", aliases: ["genetics"], concepts: ["genomics"] }
    - { term: "bioinformatics", concepts: ["bioinformatics"] }
    - { term: "medicine", aliases: ["clinical", "medical"], concepts: ["medicine"] }
    - { term: "physics", aliases: ["particle physics"], concepts: ["physics"] }
    - { term: "chemistry", aliases: ["chemical"], concepts: ["chemistry"] }
    - { term: "ecology", concepts: ["ecology"] }
    - "quantum"
    - "protein"
    - "molecule"

  HUMAN:
    - { term: "psychology", aliases: ["behavioral science"], concepts: ["psychology"] }
    - { term: "cognitive science", aliases: ["cognition"], concepts: ["cognition"] }
    - { term: "neuroscience", aliases: ["neuro"], concepts: ["neuroscience"] }
    - { term: "human behavior", aliases: ["behaviour", "behavior"], concepts: ["behavior"] }
    - { term: "decision making", aliases: ["decision-making"], concepts: ["decision-making"] }
    - "perception"
    - "mental health"

  SOCIAL:
    - { term: "sociology", concepts: ["sociology"] }
    - { term: "economics", aliases: ["economic"], concepts: ["economics"] }
    - { term: "political science", aliases: ["politics"], concepts: ["politics"] }
    - { term: "governance", aliases: ["public policy"], concepts: ["governance"] }
    - { term: "organization", aliases: ["organizational"], concepts: ["organization"] }
    - { term: "social science", concepts: ["social-science"] }
    - "anthropology"
    - "international relations"

  CULTURE:
    - { term: "art history", aliases: ["visual arts"], concepts: ["art"] }
    - { term: "musicology", aliases: ["music studies"], concepts: ["music"] }
    - { term: "cinema studies", aliases: ["film studies"], concepts: ["cinema"] }
    - { term: "literature", aliases: ["literary"], concepts: ["literature"] }
    - { term: "philosophy", concepts: ["philosophy"] }
    - { term: "religion", concepts: ["religion"] }
    - { term: "cultural studies", concepts: ["culture"] }
    - "ethics"
    - "aesthetics"

  DESIGN:
    - { term: "ux design", aliases: ["user experience", "ux"], concepts: ["ux"] }
    - { term: "product design", concepts: ["product-design"] }
    - { term: "interaction design", concepts: ["interaction-design"] }
    - { term: "architecture", aliases: ["urban design"], concepts: ["architecture"] }
    - { term: "systems thinking", aliases: ["design thinking"], concepts: ["systems-thinking"] }
    - "graphic design"

  ENGINEERING:
    - { term: "systems engineering", concepts: ["systems-engineering"] }
    - { term: "infrastructure", aliases: ["infrastructure engineering"], concepts: ["infrastructure"] }
    - { term: "hardware", aliases: ["embedded hardware"], concepts: ["hardware"] }
    - { term: "energy systems", aliases: ["energy engineering"], concepts: ["energy"] }
    - "civil engineering"
    - "mechanical engineering"
    - "electrical engineering"

  META:
    - { term: "research methods", aliases: ["methodology"], concepts: ["research-methods"] }
    - { term: "learning science", aliases: ["learning systems"], concepts: ["learning"] }
    - { term: "epistemology", concepts: ["epistemology"] }
    - { term: "classification", aliases: ["taxonomy"], concepts: ["classification"] }

  # Catch-all — always last
  # Leave META above with explicit terms; fallback is still handled in code.

# ------------------------------------------------------------------
# Slugification
# ------------------------------------------------------------------
slug_word_limit: 6     # max keywords kept from the title (3–6 recommended)

# ------------------------------------------------------------------
# Classification tuning (weighted fuzzy scoring)
# ------------------------------------------------------------------
classification:
  field_weights:
    title: 3.0
    filename: 2.0
    first_page: 1.5
    abstract: 1.2
  fuzzy:
    enabled: true
    threshold: 0.88
    partial_threshold: 0.92
    fuzzy_boost: 0.7
  secondary_domains:
    max_count: 3
    min_relative_score: 0.35
  concept_tags:
    min_count: 1
    fallback: general

# ------------------------------------------------------------------
# Metadata enrichment
# ------------------------------------------------------------------
metadata_enrichment:
  enabled: true
  grobid_url: ""                # optional, e.g. http://localhost:8070
  grobid_timeout_seconds: 20
  crossref_enabled: true
  semantic_scholar_enabled: true
  api_timeout_seconds: 15
  user_agent: "vault-library-pipeline/1.1"

# ------------------------------------------------------------------
# Watch mode
# ------------------------------------------------------------------
watch_interval_seconds: 10   # poll interval for --watch mode (seconds)
