# vault-library-pipeline — configuration
# All matches are case-insensitive substring checks on the PDF title.
# First matching key wins in each section.
# PAPER (type) and META (domain) are built-in catch-alls — keep them last.

# ------------------------------------------------------------------
# TYPE inference
# Keys become the TYPE token in the filename (must be UPPER_ALPHA).
# ------------------------------------------------------------------
type_keywords:

  # Academic
  REVIEW:       ["review", "systematic review", "literature review"]
  SURVEY:       ["survey"]
  META:         ["meta-analysis", "meta analysis"]
  THESIS:       ["thesis", "mémoire"]
  DISSERTATION: ["dissertation", "doctoral thesis", "phd thesis"]
  PREPRINT:     ["preprint", "arxiv", "working paper"]

  # Conference / publication formats
  PROCEEDING:   ["proceedings", "conference paper", "in proceedings"]
  ABSTRACT:     ["extended abstract", "abstract only"]
  POSTER:       ["poster"]
  TALK:         ["presentation", "slide deck", "keynote", "talk slides"]

  # Books & long-form
  BOOK:         ["handbook", "textbook", "introduction to", "guide to",
                  "principles of", "foundations of"]
  CHAPTER:      ["chapter"]
  MONOGRAPH:    ["monograph"]

  # Technical / industry / grey literature
  REPORT:       ["report", "technical report"]
  WHITEPAPER:   ["white paper", "whitepaper", "position paper"]
  STANDARD:     ["iso standard", "rfc", "w3c recommendation", "ieee standard"]
  SPEC:         ["specification", "api spec", "technical specification"]
  DOC:          ["documentation", "reference manual", "user manual"]

  # Educational / explanatory
  TUTORIAL:     ["tutorial", "step-by-step guide"]
  GUIDE:        ["guide", "how-to", "best practices"]
  COURSE:       ["course material", "lecture notes", "lecture series"]
  NOTE:         ["reading notes", "field notes", "informal notes"]

  # Data / code / artifacts
  DATASET:      ["dataset", "data collection", "corpus"]
  BENCHMARK:    ["benchmark", "evaluation dataset", "leaderboard"]
  CODE:         ["implementation", "codebase", "repository reference"]
  MODEL:        ["model architecture", "pretrained model", "model card"]

  # Media / communication
  ARTICLE:      ["magazine article", "editorial", "op-ed"]
  BLOG:         ["blog post", "blog"]
  NEWS:         ["news article", "press release"]
  INTERVIEW:    ["interview", "q&a", "discussion transcript"]

  # Legal / policy
  POLICY:       ["policy document", "governance document", "framework document"]
  LAW:          ["legal text", "statute", "legislation"]
  REGULATION:   ["regulation", "regulatory document", "directive"]

  # Catch-all — always last
  PAPER:        []

# ------------------------------------------------------------------
# DOMAIN inference
# Keys become the DOMAIN token in the filename (must be UPPER_ALPHA).
# Subdomains (e.g. COMPUTE.RECSYS) go in tags, not in the filename.
# ------------------------------------------------------------------
domain_keywords:

  FORMAL:      ["mathematics", "mathematical", "logic", "statistics",
                "statistical", "optimization", "algebra", "topology",
                "probability", "calculus", "combinatorics", "formal methods",
                "symbolic"]

  COMPUTE:     ["algorithm", "machine learning", "deep learning",
                "neural network", "recommendation system", "natural language",
                "nlp", "computer vision", "artificial intelligence",
                "transformer", "large language model", "llm", "generative ai",
                "software engineering", "database", "distributed system",
                "network security", "cybersecurity", "blockchain", "computing"]

  NATURE:      ["biology", "genomics", "protein", "cell biology", "genetics",
                "gene", "bioinformatics", "ecology", "physics", "chemistry",
                "molecule", "quantum", "particle physics", "medicine",
                "pharmacology", "astrophysics", "neurobiology", "molecular"]

  HUMAN:       ["psychology", "cognitive science", "cognition", "neuroscience",
                "human behavior", "perception", "decision making",
                "behavioral science", "mental health"]

  SOCIAL:      ["sociology", "economics", "political science", "politics",
                "governance", "public policy", "anthropology", "organization",
                "social science", "international relations"]

  CULTURE:     ["art history", "musicology", "cinema studies", "film studies",
                "literary", "philosophy", "religion", "ethics", "aesthetics",
                "cultural studies", "media studies"]

  DESIGN:      ["ux design", "user experience", "product design",
                "interaction design", "architecture", "urban design",
                "systems thinking", "design thinking", "graphic design"]

  ENGINEERING: ["infrastructure", "hardware", "energy systems",
                "systems engineering", "applied engineering", "civil engineering",
                "mechanical engineering", "electrical engineering"]

  # Catch-all — always last
  META:        []

# ------------------------------------------------------------------
# Slugification
# ------------------------------------------------------------------
slug_word_limit: 6     # max keywords kept from the title (3–6 recommended)

# ------------------------------------------------------------------
# Watch mode
# ------------------------------------------------------------------
watch_interval_seconds: 10   # poll interval for --watch mode (seconds)
