version: 2

updates:
  - package-ecosystem: pip
    directory: /library_pipeline
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    labels:
      - chore
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    labels:
      - chore
      - ci
    commit-message:
      prefix: "ci"
