name: Bug report
description: Report a reproducible problem with the pipeline.
title: "[bug] <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as possible so the issue can be reproduced.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - cli.py (rename / metadata extraction)
        - export_to_obsidian.py (Obsidian note generation)
        - config.yaml (TYPE/DOMAIN inference)
        - Zotero integration
        - Obsidian template
        - Watch mode
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Drop PDF into input_pdfs/
        2. Run `python cli.py`
        3. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste terminal output here (remove any sensitive file paths).
      render: shell

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 22.04"
    validations:
      required: true
